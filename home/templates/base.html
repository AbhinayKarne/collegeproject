<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} {% endblock title %}|Abhinay Ice Creams</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
  
</style>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #C2185B;">
  <div class="container-fluid">
    <a class="navbar-brand" href="/"style="font-family:'Lobster', cursive;">Abhinay Ice Creams</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <!-- Home Link -->
        <li class="nav-item">
            <a class="nav-link {% if request.path == 'Catageory' %}active{% endif %}" href="/catageory">Catageory</a>
        </li>
    
        <!-- About Us Link -->
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">About Us</a>
        </li>
    
        <!-- Contact Link -->
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/contact' %}active{% endif %}" href="/contact">Contact</a>
        </li>
  
         <!-- cart Link -->
        <li class="nav-item">
            <a class="nav-link {% if request.path == '/cart' %}active{% endif %}" href="/cart">cart</a>
        </li>
    </ul>
    
      <form class="d-flex" method="GET" action="{% url 'search_results' %}">
        <input class="form-control me-2" type="search" name="query" placeholder="Search" aria-label="Search">
        <button class="btn" style="color: white;border-color: aliceblue;" type="submit">Search</button>
    </form>
    
    </div>
  </div>
</nav>
{% block body %} {% endblock body %}
<footer class="bg-dark text-white text-center py-3">
  <p>&copy; 2025 Abhinay Ice Creams. All rights reserved.</p>
</footer>
<!-- Bootstrap JavaScript (for dropdown and responsive toggle button) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
